name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Build static site for GitHub Pages
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"

      - name: SPA fallback for GitHub Pages
        run: cp dist/client/index.html dist/client/404.html

      - name: Disable Jekyll on GitHub Pages
        run: touch dist/client/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist/client
          force_orphan: true
